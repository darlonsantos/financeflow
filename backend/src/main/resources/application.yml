spring:
  application:
    name: financeflow-api
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:financeflow}
    username: ${DB_USER:financeflow}
    password: ${DB_PASSWORD:financeflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:darlonsantos.darlon53@gmail.com}
    password: ${MAIL_PASSWORD:uamiuprgwysmojkv}
   # host: smtp.gmail.com
   # port: 587
   # username: darlonsantos@gmail.com
   # password: fedbyorzmthbnumz

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

logging:
  level:
    root: INFO
    com.financeflow: DEBUG
    org.springframework.security: DEBUG
    jakarta.mail: DEBUG
    com.sun.mail: DEBUG
  # Configurações de pattern são gerenciadas pelo logback-spring.xml

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-minimum-32-characters}
  refresh-secret: ${JWT_REFRESH_SECRET:your-256-bit-refresh-secret-key-change-in-production-minimum-32-characters}
  access-token-expiration: 900000  # 15 minutos
  refresh-token-expiration: 604800000  # 7 dias

# Em produção defina CORS_ALLOWED_ORIGINS no ambiente (sem localhost, se desejar).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:3001,https://www.darlonsantos.com.br,https://darlonsantos.com.br}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

rate-limit:
  auth:
    requests-per-minute: 30  # Aumentado para desenvolvimento/teste
    block-duration-minutes: 5  # Reduzido para desenvolvimento
  api:
    requests-per-minute: 100

# Email Settings
email:
  from: ${EMAIL_FROM:noreply@financeflow.com}
  frontend-url: ${FRONTEND_URL:http://localhost:8081}
  password-reset:
    expiration-hours: 24
  email-verification:
    expiration-hours: 72

# Ollama (IA local) - desabilitado; em uso apenas Gemini. Para reativar: OLLAMA_ENABLED=true e subir serviço ollama.
ollama:
  enabled: ${OLLAMA_ENABLED:false}
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}
  timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:30}

# Google Gemini API - Assistente financeiro (prioridade sobre Ollama quando habilitado)
# Segurança: defina GEMINI_API_KEY apenas no backend (variável de ambiente). Nunca exponha no frontend.
# Modelo gemini-2.5-flash: bom custo-benefício e baixa latência.
gemini:
  enabled: ${GEMINI_ENABLED:true}
  api-key: ${GEMINI_API_KEY:AIzaSyCw1gR1O32MdZf4Unq_7OEqIDmThR-OLVk}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}
  max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:1024}
  temperature: ${GEMINI_TEMPERATURE:0.2}

# API Versioning
api:
  version:
    current: v1
    default: v1
    supported: v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    db:
      enabled: true

open-finance:
  enabled: ${OPEN_FINANCE_ENABLED:true}
  provider: ${OPEN_FINANCE_PROVIDER:pluggy}
  base-url: ${OPEN_FINANCE_BASE_URL:https://api.pluggy.ai}
  client-id: ${OPEN_FINANCE_CLIENT_ID:}
  client-secret: ${OPEN_FINANCE_CLIENT_SECRET:}
  crypto-key: ${OPEN_FINANCE_CRYPTO_KEY:financeflow-open-finance-key-32chars}
