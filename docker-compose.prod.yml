services:
  postgres:
    image: postgres:15-alpine
    container_name: financeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-financeflow}
      POSTGRES_USER: ${DB_USER:-financeflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-financeflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financeflow-network

  api:
    image: ${REGISTRY}/${NAMESPACE}/financeflow-api:${APP_VERSION}
    container_name: financeflow-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      EMAIL_FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - financeflow-network

  frontend:
    image: ${REGISTRY}/${NAMESPACE}/financeflow-frontend:${APP_VERSION}
    container_name: financeflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - financeflow-network

volumes:
  postgres_data:

networks:
  financeflow-network:
    driver: bridge
