services:
  postgres:
    image: postgres:15-alpine
    container_name: financeflow-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-financeflow}
      POSTGRES_USER: ${DB_USER:-financeflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-financeflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-financeflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financeflow-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financeflow-api
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-financeflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-financeflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-financeflow}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production-minimum-32-characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-256-bit-refresh-secret-key-change-in-production-minimum-32-characters}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-}
      EMAIL_FRONTEND_URL: ${FRONTEND_URL:-}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - financeflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financeflow-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      - api
    networks:
      - financeflow-network

volumes:
  postgres_data:

networks:
  financeflow-network:
    driver: bridge